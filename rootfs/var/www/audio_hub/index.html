<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snapcast Audio Hub</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101417;
      --surface: #161c20;
      --surface-2: #1d252a;
      --line: #324149;
      --text: #eef5f7;
      --muted: #9badb6;
      --accent: #59c3aa;
      --accent-2: #f0b45b;
      --bad: #ef6b6b;
      --good: #70d990;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 32px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 24px; line-height: 1.2; letter-spacing: 0; }
    h2 { font-size: 15px; margin-bottom: 12px; }
    p { color: var(--muted); }

    .summary {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(240, 180, 91, .14);
    }

    .dot.good {
      background: var(--good);
      box-shadow: 0 0 0 3px rgba(112, 217, 144, .14);
    }

    .dot.bad {
      background: var(--bad);
      box-shadow: 0 0 0 3px rgba(239, 107, 107, .14);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr .9fr;
      gap: 12px;
    }

    .panel {
      min-width: 0;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .wide { grid-column: span 3; }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 38px;
      border-top: 1px solid rgba(255,255,255,.05);
    }

    .row:first-of-type { border-top: 0; }
    .row span, label span { color: var(--muted); font-size: 13px; }

    label {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    select, input, button {
      font: inherit;
    }

    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0f1417;
      color: var(--text);
      padding: 0 10px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    button {
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: var(--accent);
      color: #061411;
      padding: 0 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    button.secondary {
      background: var(--surface-2);
      border-color: var(--line);
      color: var(--text);
    }

    button.off {
      background: #2b3338;
      color: var(--muted);
      border-color: var(--line);
    }

    .status {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .tile {
      min-height: 74px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface-2);
    }

    .tile strong {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .tile span {
      overflow-wrap: anywhere;
      font-size: 15px;
    }

    pre {
      max-height: 320px;
      overflow: auto;
      white-space: pre-wrap;
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0c1012;
      color: #c9d6dc;
      font-size: 12px;
    }

    .ports {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .port {
      padding: 10px;
      border-radius: 7px;
      background: #0f1417;
      color: var(--muted);
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .port b {
      display: block;
      color: var(--text);
      font-size: 15px;
      margin-top: 4px;
    }

    .advisory {
      display: none;
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid rgba(240, 180, 91, .45);
      border-radius: 7px;
      background: rgba(240, 180, 91, .09);
      color: #f4d49f;
      line-height: 1.45;
    }

    .advisory.show {
      display: block;
    }

    .device-select {
      margin-top: 12px;
    }

    .meter {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }

    .meter-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .meter-track {
      height: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #0b0f11;
    }

    .meter-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .16s ease;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    @media (max-width: 860px) {
      .topbar { align-items: stretch; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .wide { grid-column: span 1; }
      .status, .ports { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Snapcast Audio Hub</h1>
        <div class="summary"><i id="healthDot" class="dot"></i><span id="subtitle">Connecting</span></div>
      </div>
      <button id="restart" class="secondary" title="Restart audio pipeline">Restart Pipeline</button>
    </header>

    <section class="grid">
      <article class="panel">
        <h2>Routing</h2>
        <label>
          <span>Source mode</span>
          <select id="routingMode">
            <option value="mix">Mix inputs</option>
            <option value="wired_only">Wired only</option>
            <option value="network_only">Network only</option>
            <option value="bluetooth_only">Bluetooth only</option>
            <option value="fallback_duck">Ducking fallback</option>
            <option value="source_switch">Source switch</option>
          </select>
        </label>
        <label>
          <span>Latency <b id="latencyValue"></b></span>
          <input id="latency" type="range" min="40" max="1000" step="10">
        </label>
        <label class="device-select">
          <span>Capture device</span>
          <select id="captureDevice">
            <option value="auto">Auto detect</option>
          </select>
        </label>
      </article>

      <article class="panel">
        <h2>Inputs</h2>
        <div class="row"><span>Wired USB/line input</span><button id="wiredToggle">On</button></div>
        <div class="row"><span>Network PCM bridge</span><button id="networkToggle">On</button></div>
        <div class="row"><span>Bluetooth receiver</span><button id="bluetoothToggle">Off</button></div>
        <div class="meter">
          <div class="meter-head"><span>Input signal</span><b id="meterText">waiting</b></div>
          <div class="meter-track"><div id="meterFill" class="meter-fill"></div></div>
          <div class="actions">
            <button id="testInput" class="secondary">Test Input</button>
            <button id="recordClip" class="secondary">Record Test Clip</button>
            <button id="reloadDevices" class="secondary">Rescan Devices</button>
          </div>
          <audio id="monitorClip" controls></audio>
        </div>
      </article>

      <article class="panel">
        <h2>Levels</h2>
        <label><span>Wired <b id="wiredVolumeValue"></b></span><input id="wiredVolume" type="range" min="0" max="200" step="1"></label>
        <label><span>Network <b id="networkVolumeValue"></b></span><input id="networkVolume" type="range" min="0" max="200" step="1"></label>
        <label><span>Bluetooth <b id="bluetoothVolumeValue"></b></span><input id="bluetoothVolume" type="range" min="0" max="200" step="1"></label>
      </article>

      <article class="panel wide">
        <h2>Status</h2>
        <div id="advisory" class="advisory"></div>
        <div id="status" class="status"></div>
        <div class="ports" id="ports"></div>
      </article>

      <article class="panel wide">
        <h2>Audio Devices</h2>
        <pre id="devices">Waiting for diagnostics...</pre>
      </article>
    </section>
  </main>

  <script>
    const state = { status: null, apiBase: null };
    const $ = (id) => document.getElementById(id);

    function apiCandidates(path) {
      const cleanPath = path.startsWith("/") ? path : `/${path}`;
      const appPath = window.location.pathname.replace(/\/$/, "");
      const candidates = [];
      if (state.apiBase !== null) candidates.push(`${state.apiBase}${cleanPath}`);
      candidates.push(cleanPath);
      if (appPath.startsWith("/app/")) {
        candidates.push(`${appPath}${cleanPath}`);
        candidates.push(`${appPath}/${cleanPath.slice(1)}`);
      }
      candidates.push(new URL(`.${cleanPath}`, `${window.location.href.replace(/\/$/, "")}/`).pathname);
      return [...new Set(candidates)];
    };

    async function api(path, options = {}) {
      let lastError = null;
      for (const candidate of apiCandidates(path)) {
        try {
          const response = await fetch(candidate, {
            headers: { "content-type": "application/json" },
            ...options,
          });
          if (!response.ok) {
            lastError = new Error(`${response.status} ${response.statusText}`);
            continue;
          }
          state.apiBase = candidate.slice(0, -path.length);
          return response.json();
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error("API unavailable");
    }

    function tile(label, value) {
      return `<div class="tile"><strong>${label}</strong><span>${value ?? "unknown"}</span></div>`;
    }

    function setButton(button, enabled) {
      button.textContent = enabled ? "On" : "Off";
      button.classList.toggle("off", !enabled);
    }

    function setRange(id, value) {
      $(id).value = Math.round(value);
      $(`${id}Value`).textContent = `${Math.round(value)}%`;
    }

    function render() {
      const data = state.status;
      if (!data) return;
      const config = data.config || {};
      const health = data.health || {};
      const good = health.pipeline === "running";
      $("healthDot").className = `dot ${good ? "good" : "bad"}`;
      $("subtitle").textContent = data.summary || "Running";

      $("routingMode").value = config.audio?.routing_mode || "mix";
      $("latency").value = config.audio?.latency_ms || 120;
      $("latencyValue").textContent = `${$("latency").value} ms`;
      renderCaptureDevices(data.devices || {}, config.wired?.device || "auto");

      setButton($("wiredToggle"), Boolean(config.wired?.enabled));
      setButton($("networkToggle"), Boolean(config.network?.enabled));
      setButton($("bluetoothToggle"), Boolean(config.wireless?.bluetooth_enabled));
      setRange("wiredVolume", (config.wired?.volume ?? 0.9) * 100);
      setRange("networkVolume", (config.network?.volume ?? 0.85) * 100);
      setRange("bluetoothVolume", (config.wireless?.volume ?? 0.85) * 100);

      $("status").innerHTML = [
        tile("Pipeline", health.pipeline),
        tile("Snapcast", health.snapcast),
        tile("PulseAudio", health.pulse),
        tile("Active Source", health.active_source),
        tile("Wired Input", health.wired_input),
        tile("Input Detail", health.input_message),
        tile("Capture Mode", health.capture_mode),
        tile("Network Input", health.network_input),
        tile("Bluetooth", health.bluetooth_input),
        tile("Entities", health.entities),
      ].join("");

      const notes = data.devices?.notes || [];
      const recommendations = data.devices?.recommended_hardware || [];
      const advisoryText = [...notes, ...recommendations].join(" ");
      $("advisory").textContent = advisoryText;
      $("advisory").classList.toggle("show", Boolean(advisoryText));

      $("ports").innerHTML = [
        `<div class="port">Snapcast stream<b>${config.snapcast?.client_stream_port ?? "?"}</b></div>`,
        `<div class="port">Snapcast JSON-RPC<b>${config.snapcast?.jsonrpc_port ?? "?"}</b></div>`,
        `<div class="port">Snapcast web/control<b>${config.snapcast?.http_port ?? "?"}</b></div>`,
      ].join("");

      $("devices").textContent = JSON.stringify(data.devices || {}, null, 2);
    }

    function renderCaptureDevices(devices, selected) {
      const select = $("captureDevice");
      const choices = [{ value: "auto", label: "Auto detect" }];
      for (const device of devices.capture || []) {
        const value = device.plughw || device.alsa;
        choices.push({
          value,
          label: `${value} - ${device.description || device.card_name || "capture device"}`,
        });
      }
      const oldValue = select.value;
      select.innerHTML = choices.map((choice) => {
        const isSelected = choice.value === selected || (!selected && choice.value === "auto");
        return `<option value="${choice.value}" ${isSelected ? "selected" : ""}>${choice.label}</option>`;
      }).join("");
      if ([...select.options].some((option) => option.value === oldValue) && document.activeElement === select) {
        select.value = oldValue;
      }
    }

    async function refresh() {
      try {
        state.status = await api("/api/status");
        render();
      } catch (err) {
        $("healthDot").className = "dot bad";
        $("subtitle").textContent = `UI disconnected: ${err.message}`;
      }
    }

    async function refreshLevel() {
      try {
        const level = await api("/api/input-level");
        const percent = Math.min(100, Math.round((level.peak || level.level || 0) * 140));
        $("meterFill").style.width = `${percent}%`;
        $("meterText").textContent = level.ok ? `${Math.round((level.level || 0) * 100)}% ${level.state}` : `${level.state}${level.error ? " - " + level.error.slice(0, 90) : ""}`;
      } catch (err) {
        $("meterText").textContent = "unavailable";
      }
    }

    function apiUrl(path) {
      const candidates = apiCandidates(path);
      return state.apiBase !== null ? `${state.apiBase}${path}` : candidates[0];
    }

    async function patchConfig(payload) {
      $("subtitle").textContent = "Applying changes";
      state.status = await api("/api/config", { method: "PATCH", body: JSON.stringify(payload) });
      render();
    }

    $("restart").addEventListener("click", async () => {
      $("subtitle").textContent = "Restarting pipeline";
      await api("/api/restart", { method: "POST", body: "{}" });
      await refresh();
    });
    $("reloadDevices").addEventListener("click", async () => {
      $("subtitle").textContent = "Scanning audio devices";
      await api("/api/reload-devices", { method: "POST", body: "{}" });
      await refresh();
    });
    $("testInput").addEventListener("click", async () => {
      await refreshLevel();
      await refresh();
    });
    $("recordClip").addEventListener("click", async () => {
      $("meterText").textContent = "recording 3s";
      const clip = $("monitorClip");
      clip.src = `${apiUrl("/api/monitor.wav")}?t=${Date.now()}`;
      clip.load();
      setTimeout(() => clip.play().catch(() => {}), 3600);
      await refreshLevel();
    });
    $("routingMode").addEventListener("change", (event) => patchConfig({ audio: { routing_mode: event.target.value } }));
    $("latency").addEventListener("input", (event) => $("latencyValue").textContent = `${event.target.value} ms`);
    $("latency").addEventListener("change", (event) => patchConfig({ audio: { latency_ms: Number(event.target.value) } }));
    $("captureDevice").addEventListener("change", (event) => patchConfig({ wired: { device: event.target.value } }));
    $("wiredVolume").addEventListener("input", (event) => $("wiredVolumeValue").textContent = `${event.target.value}%`);
    $("networkVolume").addEventListener("input", (event) => $("networkVolumeValue").textContent = `${event.target.value}%`);
    $("bluetoothVolume").addEventListener("input", (event) => $("bluetoothVolumeValue").textContent = `${event.target.value}%`);
    $("wiredVolume").addEventListener("change", (event) => patchConfig({ wired: { volume: Number(event.target.value) / 100 } }));
    $("networkVolume").addEventListener("change", (event) => patchConfig({ network: { volume: Number(event.target.value) / 100 } }));
    $("bluetoothVolume").addEventListener("change", (event) => patchConfig({ wireless: { volume: Number(event.target.value) / 100 } }));
    $("wiredToggle").addEventListener("click", () => patchConfig({ wired: { enabled: !state.status?.config?.wired?.enabled } }));
    $("networkToggle").addEventListener("click", () => patchConfig({ network: { enabled: !state.status?.config?.network?.enabled } }));
    $("bluetoothToggle").addEventListener("click", () => patchConfig({ wireless: { bluetooth_enabled: !state.status?.config?.wireless?.bluetooth_enabled } }));

    refresh();
    refreshLevel();
    setInterval(refresh, 5000);
    setInterval(refreshLevel, 1000);
  </script>
</body>
</html>
