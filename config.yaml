name: Snapcast Audio Hub
slug: snapcast_audio_hub
description: Self-contained wired/wireless audio input mixer and Snapcast server for HAOS on Raspberry Pi
version: 1.2.5
url: https://local.addons/snapcast-audio-hub
arch:
  - aarch64
  - armv7
  - armhf
  - amd64
startup: services
boot: auto
init: false
host_network: true
apparmor: false
full_access: true
audio: true
usb: true
udev: true
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 41888
panel_icon: mdi:speaker-multiple
panel_title: Audio Hub
webui: http://[HOST]:[PORT:41888]
map:
  - share:rw
  - config:rw
  - ssl
devices:
  - /dev/snd
  - /dev/bus/usb
ports:
  41704/tcp: 41704
  41705/tcp: 41705
  41780/tcp: 41780
  41888/tcp: 41888
  5555/tcp: 5555
  5556/udp: 5556
ports_description:
  41704/tcp: Audio Hub Snapcast client stream
  41705/tcp: Audio Hub Snapcast JSON-RPC control
  41780/tcp: Audio Hub Snapcast HTTP control interface
  41888/tcp: Audio Hub web UI and API
  5555/tcp: Optional raw PCM network input
  5556/udp: Optional RTP network input
services:
  - mqtt:want
options:
  audio:
    sample_rate: 48000
    channels: 2
    format: s16le
    latency_ms: 20
    buffer_ms: 80
    keepalive_silence: true
    routing_mode: mix
  wired:
    enabled: true
    device: auto
    profile: line_in
    capture_backend: auto
    latency_ms: 8
    volume: 0.9
    mute: false
  network:
    enabled: true
    tcp_pcm_enabled: true
    tcp_pcm_port: 5555
    rtp_enabled: false
    rtp_port: 5556
    volume: 0.85
  wireless:
    bluetooth_enabled: false
    bluetooth_pairable: false
    volume: 0.85
  snapcast:
    stream_name: AudioHub
    client_stream_port: 41704
    jsonrpc_port: 41705
    http_port: 41780
    codec: pcm
    buffer_ms: 120
    chunk_ms: 5
  music_assistant:
    enabled: true
    stream_prefix: MusicAssistant
    tap_client_id: audio-hub-ma-tap
    tap_client_name: Audio Hub Mix Input
    auto_route_players: true
    manage_tap_group_stream: false
    music_volume: 0.85
    mic_injection_enabled: true
    ducking_enabled: false
    ducking_level: 0.35
    low_latency_mode: true
  entities:
    mqtt_enabled: true
    mqtt_discovery_prefix: homeassistant
    mqtt_base_topic: snapcast_audio_hub
    ha_rest_enabled: true
  ui:
    port: 41888
  diagnostics:
    log_level: info
    health_interval_sec: 10
    startup_device_settle_sec: 4
schema:
  audio:
    sample_rate: int(8000,192000)
    channels: int(1,2)
    format: list(s16le|s24le|s32le|float32le)
    latency_ms: int(10,1000)
    buffer_ms: int(40,5000)
    keepalive_silence: bool
    routing_mode: list(mix|wired_only|network_only|bluetooth_only|fallback_duck|source_switch)
  wired:
    enabled: bool
    device: str
    profile: list(line_in|mic|aux)
    capture_backend: list(auto|direct_alsa|haos_pulse)
    latency_ms: int(8,80)
    volume: float(0,2)
    mute: bool
  network:
    enabled: bool
    tcp_pcm_enabled: bool
    tcp_pcm_port: port
    rtp_enabled: bool
    rtp_port: port
    volume: float(0,2)
  wireless:
    bluetooth_enabled: bool
    bluetooth_pairable: bool
    volume: float(0,2)
  snapcast:
    stream_name: str
    client_stream_port: port
    jsonrpc_port: port
    http_port: port
    codec: list(pcm|flac|ogg|opus)
    buffer_ms: int(40,5000)
    chunk_ms: int(5,100)
  music_assistant:
    enabled: bool
    stream_prefix: str
    tap_client_id: str
    tap_client_name: str
    auto_route_players: bool
    manage_tap_group_stream: bool
    music_volume: float(0,2)
    mic_injection_enabled: bool
    ducking_enabled: bool
    ducking_level: float(0,1)
    low_latency_mode: bool
  entities:
    mqtt_enabled: bool
    mqtt_discovery_prefix: str
    mqtt_base_topic: str
    ha_rest_enabled: bool
  ui:
    port: port
  diagnostics:
    log_level: list(debug|info|warning|error)
    health_interval_sec: int(2,120)
    startup_device_settle_sec: int(0,30)
